<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        a-scene {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
            box-sizing: border-box;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .status {
            background: rgba(15, 23, 42, 0.8);
            color: #f1f5f9;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: sans-serif;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            font-size: 14px;
            font-weight: 600;
        }

        .exit-btn {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 16px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
        }

        /* Reticle for center-screen interaction */
        #reticle {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid #38bdf8;
            border-radius: 50%;
            z-index: 200;
            pointer-events: none;
            background: rgba(56, 189, 248, 0.1);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="loading-screen" class="loading-screen">
        <h2 id="loading-header">Initializing Calm Space...</h2>
        <p id="loading-text">Authenticating...</p>
    </div>

    <div id="reticle"></div>

    <div id="overlay">
        <div class="top-bar">
            <div id="status-chip" class="status">Loading...</div>
            <button class="exit-btn" onclick="exitAR()">✕ Exit</button>
        </div>
        <div></div>
    </div>

    <canvas id="heatmap-canvas"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50;"></canvas>

    <script>
        // Use Global Logger
        function log(msg) {
            console.log("[AR Engine]", msg);
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ action: 'log', message: msg }));
            }
        }

        function exitAR() {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ action: 'exit' }));
            }
        }

        // --- Core AR Logic ---
        let roomRecognized = false;
        let activeTargetEl = null;
        let lastTimestamp = 0;
        const pointBuffer = [];

        window.receiveNativeAuth = function (userId, petId, idToken) {
            log("Auth received: " + userId);
            window.AR_USER_ID = userId;
            window.AR_PET_ID = petId;
            
            document.getElementById('loading-text').innerText = 'Loading AR Assets...';
            document.getElementById('status-chip').innerText = window.STATUS_MESSAGE || 'Ready';
            
            initAR(userId, petId);
        };

        async function initAR(userId, petId) {
            const loadingText = document.getElementById('loading-text');
            const zoneId = window.AR_ZONE_ID || '';
            const mode = window.AR_MODE || 'view';

            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ 
                    action: 'getZoneData', userId, petId, zoneId 
                }));
            }

            window.loadZoneData = function(zoneData) {
                if (!zoneData || !zoneData.fileUrl) {
                    loadingText.innerText = 'Safe Zone data issue.';
                    return;
                }
                startARScene(zoneData);
            };
        }

        function startARScene(zoneData) {
            const sceneHTML = `
                <a-scene mindar-image="imageTargetSrc: ${zoneData.fileUrl}; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;" 
                         embedded vr-mode-ui="enabled: false"
                         device-orientation-permission-ui="enabled: false">
                    
                    <a-camera position="0 0 0" look-controls="enabled: false">
                         <a-entity raycaster="objects: .hit-plane; showLine: false; far: 10" position="0 0 0"></a-entity>
                    </a-camera>

                    ${[0,1,2,3,4,5].map(i => `
                        <a-entity mindar-image-target="targetIndex: ${i}" id="target-${i}">
                            <a-plane class="hit-plane" color="white" rotation="0 0 0" width="10" height="10" opacity="0.01" visible="false"></a-plane>
                            <a-sphere color="#38bdf8" radius="0.1" opacity="0.6"></a-sphere>
                        </a-entity>
                    `).join('')}
                    
                    <a-entity id="heatmap-container"></a-entity>
                </a-scene>
            `;

            document.body.insertAdjacentHTML('beforeend', sceneHTML);
            const scene = document.querySelector('a-scene');

            scene.addEventListener('arReady', () => {
                document.getElementById('loading-screen').classList.add('hidden');
                startMainLoop();
            });

            for (let i = 0; i < 6; i++) {
                const target = document.getElementById(`target-${i}`);
                target.addEventListener('targetFound', () => {
                    activeTargetEl = target;
                    roomRecognized = true;
                });
                target.addEventListener('targetLost', () => {
                    if (activeTargetEl === target) activeTargetEl = null;
                });
            }
        }

        function startMainLoop() {
            function loop(t) {
                // Throttling: 12 FPS (approx 83ms) to prevent thermal issues
                if (t - lastTimestamp < 83) {
                    requestAnimationFrame(loop);
                    return;
                }
                lastTimestamp = t;

                if (activeTargetEl) {
                    // Interaction: Automated 3D point placement based on center reticle hit
                    const raycaster = document.querySelector('[raycaster]').components.raycaster;
                    const intersections = raycaster.intersections;
                    
                    if (intersections && intersections.length > 0) {
                        const hit = intersections[0];
                        const localPos = activeTargetEl.object3D.worldToLocal(hit.point.clone());
                        
                        pointBuffer.push({
                            x: localPos.x, y: localPos.y, z: localPos.z,
                            timestamp: { __type: 'serverTimestamp' },
                            mode: 'lite_ar'
                        });
                    }
                }

                if (pointBuffer.length >= 20) {
                    sendPoints();
                }

                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }

        function sendPoints() {
            if (pointBuffer.length === 0) return;
            const points = pointBuffer.splice(0, pointBuffer.length);
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ 
                    action: 'savePoints', 
                    points,
                    userId: window.AR_USER_ID,
                    petId: window.AR_PET_ID,
                    zoneId: window.AR_ZONE_ID
                }));
            }
        }
    </script>
</body>
</html>
