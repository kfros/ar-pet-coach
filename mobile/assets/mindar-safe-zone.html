<!DOCTYPE html>
<html>

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            /* Native iOS/System stack for premium feel */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }

        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #focus-dim {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 40;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            background: radial-gradient(circle at 50% 50%,
                    rgba(0, 0, 0, 0.0) 0%,
                    rgba(0, 0, 0, 0.1) 40%,
                    rgba(0, 0, 0, 0.15) 65%,
                    rgba(0, 0, 0, 0.35) 100%);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            /* Push CTA to bottom */
            padding: 24px;
            padding-bottom: env(safe-area-inset-bottom, 32px);
            box-sizing: border-box;
        }

        .top-bar {
            position: fixed;
            top: env(safe-area-inset-top, 24px);
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .status-container {
            background: rgba(15, 23, 42, 0.75);
            color: #f1f5f9;
            padding: 12px 24px;
            border-radius: 32px;
            text-align: center;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.2px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-width: 80%;
            transition: opacity 0.4s ease;
        }

        .cta-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .cta-btn {
            pointer-events: auto;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 18px 40px;
            border-radius: 40px;
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(56, 189, 248, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cta-btn:active {
            transform: scale(0.95);
        }

        /* Active Phase: White X on Transparent background */
        .cta-btn.active-x {
            background: rgba(255, 255, 255, 0);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: none;
            font-size: 24px;
            padding: 12px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.5s ease;
        }

        .hidden {
            display: none !important;
        }

        /* ===== RETICLE ===== */
        #reticle-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            margin-left: -70px;
            margin-top: -70px;
            z-index: 150;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reticle-glow {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle,
                    rgba(56, 189, 248, 0.40) 0%,
                    rgba(56, 189, 248, 0.18) 40%,
                    rgba(56, 189, 248, 0.05) 65%,
                    transparent 100%);
            animation: reticlePulse 3s ease-in-out infinite;
        }

        @keyframes reticlePulse {

            0%,
            100% {
                transform: scale(0.95);
                opacity: 0.85;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        /* ===== SEQUENCE MESSAGES ===== */
        #sequence-overlay {
            position: fixed;
            top: 35%;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 300;
            pointer-events: none;
            min-height: 80px;
            display: flex;
        }

        .sequence-msg {
            position: absolute;
            left: 0;
            right: 0;
            color: white;
            font-size: 24px;
            font-weight: 400;
            line-height: 1.4;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease, transform 1s ease;
            padding: 0 30px;
        }

        .sequence-msg.visible {
            opacity: 1;
            transform: translateY(0px);
        }
    </style>
</head>

<body>
    <video id="camera-feed" autoplay playsinline muted></video>

    <div id="focus-dim"></div>
    <div id="active-pulse"
        style="position:fixed; top:50%; left:50%; width:300px; height:300px; margin:-150px; border-radius:50%; background:radial-gradient(circle, rgba(56,189,248,0.3) 0%, transparent 70%); z-index:150; opacity:0; pointer-events:none; transition:opacity 1s; animation: breathe 5s infinite;">
    </div>

    <div id="loading-screen" class="loading-screen">
        <h2 style="font-weight: 300;">Calm Spot</h2>
        <p style="color: #94a3b8; font-size: 14px;">Preparing session...</p>
    </div>

    <div id="reticle-ui">
        <div class="reticle-glow"></div>
    </div>

    <div id="sequence-overlay"></div>

    <div id="overlay" class="hidden">
        <div class="top-bar">
            <div id="status-chip" class="status-container">Point at the floor to begin</div>
        </div>
        <div id="cta-area" class="cta-container">
            <button id="start-btn" class="cta-btn hidden">Set calm spot</button>
        </div>
    </div>

    <script>
        var cameraFeed = document.getElementById('camera-feed');
        var reticleUI = document.getElementById('reticle-ui');
        var startBtn = document.getElementById('start-btn');
        var statusChip = document.getElementById('status-chip');
        var overlay = document.getElementById('overlay');
        var loadingScreen = document.getElementById('loading-screen');
        var activePulse = document.getElementById('active-pulse');
        var focusDim = document.getElementById('focus-dim');
        var cameraStream = null;
        var sessionState = 'ENTRY';

        function post(action, data) {
            try {
                if (window.ReactNativeWebView) {
                    window.ReactNativeWebView.postMessage(JSON.stringify(Object.assign({ action: action }, data || {})));
                }
            } catch (e) { }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
                audio: false
            }).then(function (stream) {
                cameraStream = stream;
                cameraFeed.srcObject = stream;
                cameraFeed.play();
                loadingScreen.classList.add('hidden');
                overlay.classList.remove('hidden');
                setTimeout(function () {
                    sessionState = 'PLACEMENT';
                    statusChip.innerText = "Point at the floor to begin";
                    reticleUI.style.opacity = '1';
                    startBtn.classList.remove('hidden');
                }, 1000);
            }).catch(function (err) {
                post("log", { message: "Camera error: " + err.message });
            });
        }

        window.receiveNativeAuth = function (userId, petId) {
            startCamera();
        };

        startBtn.addEventListener('click', function () {
            if (sessionState === 'ACTIVE') {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                }
                post("exit");
                return;
            }

            if (sessionState !== 'PLACEMENT') return;

            sessionState = 'ACTIVE';

            // Audio trigger
            post("startAudio");

            // Dimmer effect
            focusDim.style.opacity = '1';

            // UI Refresh
            startBtn.classList.add('active-x');
            startBtn.innerText = "X";
            statusChip.style.opacity = '0';
            reticleUI.style.opacity = '0';

            // Sequence
            var messages = ["Good. Stay here with your pet.", "Your calm helps them calm down.", "Breathe with the circle.", "Give a treat when your pet relaxes."];
            var idx = 0;
            function run() {
                if (idx >= messages.length) {
                    activePulse.style.opacity = '1';
                    return;
                }
                var m = document.createElement('div');
                m.className = 'sequence-msg';
                m.textContent = messages[idx++];
                document.getElementById('sequence-overlay').appendChild(m);
                setTimeout(() => { m.classList.add('visible'); setTimeout(() => { m.classList.remove('visible'); setTimeout(run, 1000); }, 3000); }, 100);
            }
            run();
        });
    </script>
    <style>
        @keyframes breathe {

            0%,
            100% {
                transform: scale(0.9);
                opacity: 0.3;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }
    </style>
</body>

</html>
